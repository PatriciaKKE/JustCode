version: '3.8'

services:
  postgres:
    image: postgres:latest
    container_name: postgres-db
    environment:
      POSTGRES_USER: symfony_user
      POSTGRES_PASSWORD: motdepassefort
      POSTGRES_DB: portail_rh
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - my_network

volumes:
  postgres_data:
    driver: local

networks:
  my_network:
    driver: bridge

version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    
   
    volumes:
      - .:/var/www/html
      - app_var:/var/www/html/var
    environment:
      DATABASE_URL: postgresql://db_user:patricia@database:5432/portal_rh?serverVersion=16&charset=utf8
    depends_on:
      - database

  nginx:
    image: nginx:latest
    ports:
      - "8080:80" # Expose le port 80 de Nginx sur le port 80 de ta machine
    volumes:
      # Monte le fichier de configuration Nginx
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      # Monte le répertoire de ton code source pour Nginx
      - ./:/var/www/html
    depends_on:
      - app # Nginx dépend de l'application PHP

  database:
    image: postgres:16
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: db_user
      POSTGRES_PASSWORD: patricia
      POSTGRES_DB: portal_rh

volumes:
  db_data:
 HEAD
  app_var:

